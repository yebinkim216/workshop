<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>워크샵 신청</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a18; }
  .container { max-width: 600px; margin: 0 auto; padding: 2rem 1rem; }
  .card { background: #fff; border-radius: 12px; border: 0.5px solid #e0e0dc; padding: 1.5rem; margin-bottom: 1rem; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
  .sub { font-size: 13px; color: #888; margin-bottom: 1.5rem; }
  label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
  input[type=text], input[type=email] { width: 100%; padding: 9px 12px; border: 0.5px solid #ccc; border-radius: 8px; font-size: 14px; margin-bottom: 1rem; outline: none; }
  input[type=text]:focus, input[type=email]:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.15); }
  .dates-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 1.5rem; }
  .date-card { border: 0.5px solid #e0e0dc; border-radius: 8px; padding: 12px 14px; cursor: pointer; transition: all 0.15s; }
  .date-card:hover { border-color: #3b82f6; }
  .date-card.selected { border: 1.5px solid #3b82f6; background: #eff6ff; }
  .date-label { font-size: 15px; font-weight: 500; }
  .date-slots { font-size: 12px; color: #888; margin-top: 4px; }
  .date-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; display: inline-block; margin-top: 6px; }
  .badge-ok { background: #dcfce7; color: #166534; }
  .badge-few { background: #fef9c3; color: #854d0e; }
  .badge-full { background: #fee2e2; color: #991b1b; }
  .submit-btn { width: 100%; padding: 11px; font-size: 15px; font-weight: 500; background: #3b82f6; color: #fff; border: none; border-radius: 8px; cursor: pointer; }
  .submit-btn:hover { background: #2563eb; }
  .submit-btn:disabled { opacity: 0.45; cursor: default; }
  .msg { font-size: 13px; margin-top: 10px; color: #e53e3e; text-align: center; }
  .success-box { background: #dcfce7; border: 0.5px solid #86efac; border-radius: 8px; padding: 1rem; color: #166534; font-size: 14px; margin-top: 1rem; display: none; line-height: 1.7; }
  .tab-bar { display: flex; gap: 8px; margin-bottom: 1.5rem; border-bottom: 0.5px solid #e0e0dc; }
  .tab { padding: 8px 16px; font-size: 14px; color: #888; cursor: pointer; border: none; background: none; border-bottom: 2px solid transparent; margin-bottom: -1px; }
  .tab.active { color: #3b82f6; border-bottom-color: #3b82f6; font-weight: 500; }
  .section { display: none; }
  .section.active { display: block; }
  .summary-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 1.5rem; }
  .summary-card { background: #f5f5f3; border-radius: 8px; padding: 10px 8px; text-align: center; }
  .summary-date { font-size: 11px; color: #888; }
  .summary-count { font-size: 20px; font-weight: 500; margin: 4px 0 2px; }
  .summary-bar { height: 4px; border-radius: 2px; background: #e0e0dc; overflow: hidden; }
  .summary-fill { height: 100%; border-radius: 2px; background: #3b82f6; }
  .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .admin-table th { text-align: left; padding: 8px 10px; border-bottom: 0.5px solid #ccc; color: #888; font-weight: 500; }
  .admin-table td { padding: 8px 10px; border-bottom: 0.5px solid #f0f0ec; word-break: break-all; }
  .rank-badge { font-size: 11px; padding: 2px 8px; border-radius: 99px; }
  .rank-1 { background: #dcfce7; color: #166534; }
  .rank-2 { background: #fef9c3; color: #854d0e; }
  .date-filter { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1rem; }
  .filter-btn { font-size: 12px; padding: 4px 12px; border-radius: 99px; cursor: pointer; border: 0.5px solid #ccc; background: #f5f5f3; color: #555; }
  .filter-btn.active { background: #eff6ff; color: #3b82f6; border-color: #93c5fd; }
  .no-data { text-align: center; color: #aaa; padding: 2rem 0; font-size: 13px; }
  .loading { text-align: center; color: #aaa; padding: 1rem 0; font-size: 13px; }
</style>
</head>
<body>
<div class="container">
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('apply')">신청하기</button>
    <button class="tab" onclick="switchTab('admin')">관리자 현황</button>
  </div>

  <div id="apply" class="section active">
    <div class="card">
      <h1>워크샵 신청</h1>
      <p class="sub">참석 가능한 날짜를 모두 선택해 주세요. 정원(20명) 초과 시 2순위로 자동 배정됩니다.</p>
      <label>이름</label>
      <input type="text" id="name" placeholder="홍길동" />
      <label>이메일</label>
      <input type="email" id="email" placeholder="example@company.com" />
      <label>참석 가능 날짜 (복수 선택 가능)</label>
      <div class="dates-grid" id="dates-grid"></div>
      <button class="submit-btn" id="submit-btn" onclick="submitForm()">신청하기</button>
      <p class="msg" id="form-msg"></p>
      <div class="success-box" id="success-box"></div>
    </div>
  </div>

  <div id="admin" class="section">
    <div class="card">
      <h1>신청 현황</h1>
      <p class="sub">날짜별 신청 인원 및 명단을 확인하세요.</p>
      <div class="summary-grid" id="summary-grid"></div>
      <div class="date-filter" id="date-filter"></div>
      <p style="font-size:13px;font-weight:500;color:#555;margin-bottom:8px;">신청 명단</p>
      <table class="admin-table">
        <thead><tr><th>이름</th><th>이메일</th><th>날짜</th><th>순위</th></tr></thead>
        <tbody id="admin-tbody"><tr><td colspan="4" class="loading">불러오는 중...</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://qpkweilyoyuqhouhafte.supabase.co';
const SUPABASE_KEY = 'sb_publishable_oUBgk4u8lvYiOqTuG9euig_oBd9NdG_ ';
const DATES = ['7/6(월)', '7/7(화)', '7/8(수)', '7/9(목)', '7/16(목)'];
const MAX = 20;

let registrations = [];
let selectedDates = new Set();
let adminFilter = 'all';

async function fetchData() {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/registrations?select=*&order=time.asc`, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`
    }
  });
  registrations = await res.json();
}

async function insertRow(row) {
  await fetch(`${SUPABASE_URL}/rest/v1/registrations`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(row)
  });
}

function getFirst(date) {
  return registrations.filter(r => r.date === date && r.rank === 1).length;
}

function renderDates() {
  const grid = document.getElementById('dates-grid');
  grid.innerHTML = '';
  DATES.forEach(date => {
    const first = getFirst(date);
    const full = first >= MAX;
    const few = first >= MAX - 5 && !full;
    const sel = selectedDates.has(date);
    const card = document.createElement('div');
    card.className = 'date-card' + (sel ? ' selected' : '');
    let badge = full
      ? `<span class="date-badge badge-full">마감 — 2순위 신청 가능</span>`
      : few
        ? `<span class="date-badge badge-few">잔여 ${MAX - first}석</span>`
        : `<span class="date-badge badge-ok">잔여 ${MAX - first}석</span>`;
    card.innerHTML = `<div class="date-label">${date}</div><div class="date-slots">${first}/${MAX}명 신청</div>${badge}`;
    card.onclick = () => { selectedDates.has(date) ? selectedDates.delete(date) : selectedDates.add(date); renderDates(); };
    grid.appendChild(card);
  });
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

async function submitForm() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const msg = document.getElementById('form-msg');
  if (!name) { msg.textContent = '이름을 입력해 주세요.'; return; }
  if (!email) { msg.textContent = '이메일을 입력해 주세요.'; return; }
  if (!validateEmail(email)) { msg.textContent = '올바른 이메일 형식이 아닙니다.'; return; }
  if (selectedDates.size === 0) { msg.textContent = '날짜를 하나 이상 선택해 주세요.'; return; }

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.textContent = '신청 중...';
  msg.textContent = '';

  await fetchData();

  const results = [];
  for (const date of selectedDates) {
    const first = getFirst(date);
    const rank = first >= MAX ? 2 : 1;
    const row = { name, email, date, rank, time: new Date().toISOString() };
    await insertRow(row);
    registrations.push(row);
    results.push({ date, rank });
  }

  btn.disabled = false;
  btn.textContent = '신청하기';
  document.getElementById('name').value = '';
  document.getElementById('email').value = '';
  selectedDates.clear();

  const firstDates = results.filter(r => r.rank === 1).map(r => r.date).join(', ');
  const secondDates = results.filter(r => r.rank === 2).map(r => r.date).join(', ');
  let txt = `<strong>${name}</strong>님 신청 완료!<br>`;
  if (firstDates) txt += `✅ 1순위: ${firstDates}<br>`;
  if (secondDates) txt += `⏳ 2순위 대기: ${secondDates}`;
  const box = document.getElementById('success-box');
  box.innerHTML = txt;
  box.style.display = 'block';
  renderDates();
}

function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', ['apply','admin'][i] === tab));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  if (tab === 'admin') fetchData().then(renderAdmin);
}

function renderAdmin() {
  const grid = document.getElementById('summary-grid');
  grid.innerHTML = '';
  DATES.forEach(date => {
    const first = getFirst(date);
    const pct = Math.round((first / MAX) * 100);
    grid.innerHTML += `<div class="summary-card">
      <div class="summary-date">${date}</div>
      <div class="summary-count">${first}</div>
      <div style="font-size:11px;color:#aaa;margin-bottom:6px;">/ ${MAX}명</div>
      <div class="summary-bar"><div class="summary-fill" style="width:${pct}%"></div></div>
    </div>`;
  });

  const filter = document.getElementById('date-filter');
  filter.innerHTML = `<button class="filter-btn ${adminFilter==='all'?'active':''}" onclick="setFilter('all')">전체</button>`;
  DATES.forEach(date => {
    filter.innerHTML += `<button class="filter-btn ${adminFilter===date?'active':''}" onclick="setFilter('${date}')">${date}</button>`;
  });

  const tbody = document.getElementById('admin-tbody');
  const filtered = adminFilter === 'all' ? registrations : registrations.filter(r => r.date === adminFilter);
  if (filtered.length === 0) {
    tbody.innerHTML = `<tr><td colspan="4" class="no-data">신청자가 없습니다.</td></tr>`;
    return;
  }
  tbody.innerHTML = filtered.map(r =>
    `<tr><td>${r.name}</td><td style="color:#888">${r.email}</td><td>${r.date}</td>
    <td><span class="rank-badge rank-${r.rank}">${r.rank}순위</span></td></tr>`
  ).join('');
}

function setFilter(f) { adminFilter = f; renderAdmin(); }

fetchData().then(renderDates);
</script>
</body>
</html>
